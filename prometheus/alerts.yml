groups:
  - name: finhedge_alerts
    rules:

      # Alert if prediction error rate exceeds 5%
      - alert: HighPredictionErrorRate
        expr: >
          rate(finhedge_prediction_errors_total[5m])
          / (rate(finhedge_prediction_requests_total[5m]) + 0.001)
          > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High prediction error rate (> 5%)"
          description: "Error rate is {{ $value | humanizePercentage }} for ticker {{ $labels.ticker }}."

      # Alert on data drift
      - alert: DataDriftDetected
        expr: finhedge_drift_alert == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Data drift detected for {{ $labels.ticker }}"
          description: "KL-divergence drift threshold exceeded. Consider retraining."

      # Alert if inference latency p99 exceeds 200ms
      - alert: HighInferenceLatency
        expr: >
          histogram_quantile(0.99,
            rate(finhedge_prediction_latency_seconds_bucket[5m])
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Inference p99 latency > 200ms"
          description: "p99 latency is {{ $value | humanizeDuration }}."

      # Alert if backend is down
      - alert: BackendDown
        expr: up{job="finhedge_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FinHedge backend is down"
          description: "The FastAPI backend has been unreachable for > 1 minute."
