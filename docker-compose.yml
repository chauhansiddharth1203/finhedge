version: "3.9"

# ──────────────────────────────────────────────────────────────
#  FinHedge – Stock Prediction & Hedging Platform
#  Services:  backend  |  frontend  |  mlflow  |  airflow
#             prometheus  |  grafana
# ──────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  finhedge_net:
    driver: bridge

volumes:
  mlflow_data:
  airflow_db:
  prometheus_data:
  grafana_data:
  model_store:
  raw_data:
  processed_data:

services:
  # ── Backend: FastAPI model server ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finhedge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_STORE=/app/models
      - DATA_DIR=/app/data
      - LOG_LEVEL=INFO
    volumes:
      - model_store:/app/models
      - raw_data:/app/data/raw
      - processed_data:/app/data/processed
    depends_on:
      - mlflow
    networks:
      - finhedge_net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    logging: *default-logging

  # ── Frontend: Streamlit UI ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finhedge_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - MLFLOW_URL=http://mlflow:5000
      - GRAFANA_URL=http://grafana:3000
      - AIRFLOW_URL=http://airflow:8080
    depends_on:
      - backend
    networks:
      - finhedge_net
    logging: *default-logging

  # ── MLflow Tracking + Registry ─────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: finhedge_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - finhedge_net
    logging: *default-logging

  # ── Apache Airflow (standalone) ────────────────────────────
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: finhedge_airflow
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=finhedge_secret_key
      - BACKEND_URL=http://backend:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_db:/opt/airflow
      - raw_data:/opt/airflow/data/raw
    networks:
      - finhedge_net
    logging: *default-logging
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@finhedge.ai &&
        airflow webserver --port 8080 &
        airflow scheduler
      "

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: finhedge_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - finhedge_net
    logging: *default-logging

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: finhedge_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=finhedge123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - finhedge_net
    logging: *default-logging
